name: Build Desktop Packages

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
  QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
  QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
  QINIU_BUCKET_DOMAIN: ${{ secrets.QINIU_BUCKET_DOMAIN }}

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            platform_name: macos
            artifact_name: macos-package
          - os: windows-latest
            label: Windows
            platform_name: windows
            artifact_name: windows-package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Build package
        id: build
        run: python build.py

      - name: Save build info
        run: |
          echo "${{ matrix.platform_name }}_sha256=${{ steps.build.outputs.archive_sha256 }}" >> build_info_${{ matrix.platform_name }}.txt
          echo "version=${{ steps.build.outputs.version }}" >> build_info_${{ matrix.platform_name }}.txt

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ matrix.platform_name }}
          path: build_info_${{ matrix.platform_name }}.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload to Qiniu Kodo (Direct from build runner)
        if: env.QINIU_ACCESS_KEY != '' && env.QINIU_SECRET_KEY != '' && env.QINIU_BUCKET != '' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python -m pip install qiniu
          python -c "
          import os, sys, glob
          from qiniu import Auth, put_file
          
          # 极度强力的清理：移除可能被用户误填的引号、空格、换行等
          ak = os.environ.get('QINIU_ACCESS_KEY', '').strip().strip('\'\"').strip()
          sk = os.environ.get('QINIU_SECRET_KEY', '').strip().strip('\'\"').strip()
          bucket = os.environ.get('QINIU_BUCKET', '').strip().strip('\'\"').strip()
          
          print(f'Debug: AK length={len(ak)}, SK length={len(sk)}')
          
          zip_files = glob.glob('dist/*.zip')
          if not zip_files:
              print('Error: No zip file found in dist directory!')
              sys.exit(1)
              
          file_path = zip_files[0]
          file_name = os.path.basename(file_path)
          key = f'releases/{file_name}'
          
          print(f'Uploading {file_name} to Qiniu bucket: {bucket} ...')
          
          q = Auth(ak, sk)
          # 生成覆盖上传凭证，设置过期时间为 10 小时 (36000s)，防止大文件上传中途 Token 过期
          token = q.upload_token(bucket, key, 36000)
          
          # version='v2' 使用分片上传 v2，原生支持大文件
          ret, info = put_file(token, key, file_path, version='v2')
          if info.status_code == 200:
              print('Upload successful!')
          else:
              print(f'Upload failed: {info}')
              sys.exit(1)
          "

  release:
    name: Finalize Release (Manifest & Public Repo)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
      QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
      QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
      QINIU_BUCKET_DOMAIN: ${{ secrets.QINIU_BUCKET_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Manifest
        run: |
          cat release-assets/build_info_*.txt > combined_info.txt
          
          VERSION=$(grep "version=" combined_info.txt | head -n 1 | cut -d'=' -f2)
          WIN_SHA=$(grep "windows_sha256=" combined_info.txt | cut -d'=' -f2)
          MAC_SHA=$(grep "macos_sha256=" combined_info.txt | cut -d'=' -f2)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          DOMAIN="${QINIU_BUCKET_DOMAIN}"
          if [ -z "$DOMAIN" ]; then exit 1; fi
          if [[ "$DOMAIN" != http*://* ]]; then DOMAIN="http://${DOMAIN}"; fi
          BASE="${DOMAIN}/releases"
          
          cat > manifest.json <<EOF
          {
            "latest_version": "${VERSION}",
            "min_supported_version": "1.0.0",
            "force": false,
            "notes": "版本 ${TAG_NAME} 发布。更新包含性能优化和稳定性提升。",
            "downloads": {
              "windows": "${BASE}/sph-app-windows-${TAG_NAME}.zip",
              "macos": "${BASE}/sph-app-macos-${TAG_NAME}.zip"
            },
            "sha256": {
              "windows": "${WIN_SHA}",
              "macos": "${MAC_SHA}"
            }
          }
          EOF
          cp manifest.json release-assets/

      - name: Upload Manifest to Qiniu
        if: env.QINIU_ACCESS_KEY != '' && env.QINIU_SECRET_KEY != '' && env.QINIU_BUCKET != ''
        run: |
          python -m pip install qiniu
          python -c "
          import os, sys
          from qiniu import Auth, put_file
          
          ak = os.environ.get('QINIU_ACCESS_KEY', '').strip().strip('\'\"').strip()
          sk = os.environ.get('QINIU_SECRET_KEY', '').strip().strip('\'\"').strip()
          bucket = os.environ.get('QINIU_BUCKET', '').strip().strip('\'\"').strip()
          
          file_path = 'release-assets/manifest.json'
          if not os.path.exists(file_path):
              print('Error: manifest.json not found!')
              sys.exit(1)
              
          key = 'releases/manifest.json'
          print(f'Uploading manifest.json to Qiniu bucket: {bucket} ...')
          
          q = Auth(ak, sk)
          token = q.upload_token(bucket, key, 36000)
          
          ret, info = put_file(token, key, file_path, version='v2')
          if info.status_code == 200:
              print('Upload successful!')
          else:
              print(f'Upload failed: {info}')
              sys.exit(1)
          "

      - name: Create Release in Public Repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG_NAME=${{ github.ref_name }}
          FILES=$(find release-assets -maxdepth 1 \( -name "*.zip" -o -name "manifest.json" \))
          
          gh release create "$TAG_NAME" \
            --repo qibiao17606170508/sph-app-releases \
            --title "$TAG_NAME" \
            --notes "Release $TAG_NAME" \
            --generate-notes || echo "Release already exists..."
          
          for file in $FILES; do
            gh release upload "$TAG_NAME" "$file" \
              --repo qibiao17606170508/sph-app-releases --clobber
          done

      - name: Update manifest in private repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest.json for ${GITHUB_REF#refs/tags/}" || echo "No changes to commit"
          git push origin main || echo "Push failed, skipping repository update"

      - name: Deploy to GitHub Gist (Public Access)
        if: env.GIST_ID != '' && env.GIST_TOKEN != ''
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: manifest.json
          file_type: text
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Update manifest in public repository
        run: |
          mkdir -p public-repo
          cd public-repo
          git init
          git remote add origin https://${{ secrets.RELEASE_TOKEN }}@github.com/qibiao17606170508/sph-app-releases.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main || echo "Main branch not found"
          git checkout main || git checkout -b main
          cp ../manifest.json .
          git add manifest.json
          git commit -m "chore: update manifest.json for ${GITHUB_REF#refs/tags/}" || echo "No changes"
          git push origin main
