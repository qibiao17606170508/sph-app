name: Build Desktop Packages

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            platform_name: macos
            artifact_name: macos-package
          - os: windows-latest
            label: Windows
            platform_name: windows
            artifact_name: windows-package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Build package
        id: build
        run: python build.py

      - name: Save build info
        run: |
          echo "${{ matrix.platform_name }}_sha256=${{ steps.build.outputs.archive_sha256 }}" >> build_info_${{ matrix.platform_name }}.txt
          echo "version=${{ steps.build.outputs.version }}" >> build_info_${{ matrix.platform_name }}.txt

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ matrix.platform_name }}
          path: build_info_${{ matrix.platform_name }}.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
      QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
      QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
      QINIU_BUCKET_DOMAIN: ${{ secrets.QINIU_BUCKET_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Manifest
        run: |
          # 合并所有 build_info 文件
          cat release-assets/build_info_*.txt > combined_info.txt
          
          VERSION=$(grep "version=" combined_info.txt | head -n 1 | cut -d'=' -f2)
          WIN_SHA=$(grep "windows_sha256=" combined_info.txt | cut -d'=' -f2)
          MAC_SHA=$(grep "macos_sha256=" combined_info.txt | cut -d'=' -f2)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # 七牛外链域名（确保带协议）
          DOMAIN="${QINIU_BUCKET_DOMAIN}"
          if [ -z "$DOMAIN" ]; then
            echo "QINIU_BUCKET_DOMAIN is empty. Please set repository secret QINIU_BUCKET_DOMAIN"
            exit 1
          fi
          if [[ "$DOMAIN" != http*://* ]]; then
            DOMAIN="http://${DOMAIN}"
          fi
          BASE="${DOMAIN}/releases"
          
          cat > manifest.json <<EOF
          {
            "latest_version": "${VERSION}",
            "min_supported_version": "1.0.0",
            "force": false,
            "notes": "版本 ${TAG_NAME} 发布。更新包含性能优化和稳定性提升。",
            "downloads": {
              "windows": "${BASE}/sph-app-windows-${TAG_NAME}.zip",
              "macos": "${BASE}/sph-app-macos-${TAG_NAME}.zip"
            },
            "sha256": {
              "windows": "${WIN_SHA}",
              "macos": "${MAC_SHA}"
            }
          }
          EOF
          cp manifest.json release-assets/

      - name: Upload to Qiniu Kodo
        if: env.QINIU_ACCESS_KEY != '' && env.QINIU_SECRET_KEY != '' && env.QINIU_BUCKET != '' && env.QINIU_BUCKET_DOMAIN != ''
        run: |
          set -e
          TAG_NAME=${{ github.ref_name }}
          echo "Installing qshell..."
          QS_VERSION="v2.14.0"
          curl -L -o qshell.tgz https://github.com/qiniu/qshell/releases/download/${QS_VERSION}/qshell-${QS_VERSION}-linux-amd64.tar.gz
          tar -xzf qshell.tgz
          chmod +x ./qshell
          
          echo "Configuring qshell account..."
          ./qshell account "$QINIU_ACCESS_KEY" "$QINIU_SECRET_KEY" gha
          
          echo "Uploading assets to Qiniu bucket: $QINIU_BUCKET"
          FILE_WIN="release-assets/sph-app-windows-${TAG_NAME}.zip"
          FILE_MAC="release-assets/sph-app-macos-${TAG_NAME}.zip"
          FILE_MAN="release-assets/manifest.json"
          
          if [ ! -f "$FILE_WIN" ]; then echo "Missing $FILE_WIN"; exit 1; fi
          if [ ! -f "$FILE_MAC" ]; then echo "Missing $FILE_MAC"; exit 1; fi
          if [ ! -f "$FILE_MAN" ]; then echo "Missing $FILE_MAN"; exit 1; fi
          
          # qupload2 支持分片并发上传，适合 GitHub Actions 跨国传大文件
          cat > /tmp/qiniu_upload_windows.json << 'EOF'
          {
            "src_dir": "RELEASE_DIR_PLACEHOLDER",
            "file_list": ["WIN_PLACEHOLDER"],
            "bucket": "BUCKET_PLACEHOLDER",
            "key_prefix": "releases/",
            "overwrite": true,
            "upload_threshold": 104857600,
            "part_size": 4194304,
            "compute_hash": true,
            "check_exists": true,
            "check_hash": true,
            "skip_file_sizes": 0,
            "log_file": "/tmp/qupload_windows.log",
            "log_level": "info",
            "log_stdout": true,
            "force": true
          }
          EOF
          sed -e "s|RELEASE_DIR_PLACEHOLDER|$(dirname "$FILE_WIN")|g" \
              -e "s|WIN_PLACEHOLDER|$FILE_WIN|g" \
              -e "s|BUCKET_PLACEHOLDER|$QINIU_BUCKET|g" \
              /tmp/qiniu_upload_windows.json > /tmp/qiniu_upload_windows_final.json
          
          cat > /tmp/qiniu_upload_mac.json << 'EOF'
          {
            "src_dir": "RELEASE_DIR_PLACEHOLDER",
            "file_list": ["MAC_PLACEHOLDER"],
            "bucket": "BUCKET_PLACEHOLDER",
            "key_prefix": "releases/",
            "overwrite": true,
            "upload_threshold": 104857600,
            "part_size": 4194304,
            "compute_hash": true,
            "check_exists": true,
            "check_hash": true,
            "skip_file_sizes": 0,
            "log_file": "/tmp/qupload_mac.log",
            "log_level": "info",
            "log_stdout": true,
            "force": true
          }
          EOF
          sed -e "s|RELEASE_DIR_PLACEHOLDER|$(dirname "$FILE_MAC")|g" \
              -e "s|MAC_PLACEHOLDER|$FILE_MAC|g" \
              -e "s|BUCKET_PLACEHOLDER|$QINIU_BUCKET|g" \
              /tmp/qiniu_upload_mac.json > /tmp/qiniu_upload_mac_final.json
          
          ./qshell qupload2 /tmp/qiniu_upload_windows_final.json
          ./qshell qupload2 /tmp/qiniu_upload_mac_final.json
          ./qshell fput "$QINIU_BUCKET" "releases/manifest.json" "$FILE_MAN" --overwrite

      - name: Show release assets
        run: |
          echo "Listing release-assets directory:"
          ls -R release-assets/

      - name: Create Release in Public Repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG_NAME=${{ github.ref_name }}
          # 明确指定要上传的文件，注意路径包含 release-assets/
          FILES=$(find release-assets -maxdepth 1 \( -name "*.zip" -o -name "manifest.json" \))
          echo "Files to upload:"
          echo "$FILES"
          
          # 检查文件是否存在
          if [ -z "$FILES" ]; then
            echo "Error: No files found to upload!"
            exit 1
          fi

          # 创建 Release (如果不存在) 并上传文件
          gh release create "$TAG_NAME" \
            --repo qibiao17606170508/sph-app-releases \
            --title "$TAG_NAME" \
            --notes "Release $TAG_NAME" \
            --generate-notes || echo "Release already exists, uploading files..."
          
          # 强制上传/覆盖资产
          for file in $FILES; do
            echo "Uploading $file..."
            gh release upload "$TAG_NAME" "$file" \
              --repo qibiao17606170508/sph-app-releases --clobber
          done

      - name: Update manifest in private repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest.json for ${GITHUB_REF#refs/tags/}" || echo "No changes to commit"
          git push origin main || echo "Push failed, skipping repository update"

      - name: Deploy to GitHub Gist (Public Access)
        if: env.GIST_ID != '' && env.GIST_TOKEN != ''
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: manifest.json
          file_type: text
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Update manifest in public repository
        run: |
          mkdir -p public-repo
          cd public-repo
          git init
          git remote add origin https://${{ secrets.RELEASE_TOKEN }}@github.com/qibiao17606170508/sph-app-releases.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main || echo "Main branch not found"
          git checkout main || git checkout -b main
          cp ../manifest.json .
          git add manifest.json
          git commit -m "chore: update manifest.json for ${GITHUB_REF#refs/tags/}" || echo "No changes"
          git push origin main
